         inkscape:label="How-To Kyosk Text"><tspan
           x="0"
           y="329.96719"
           id="tspan428"><tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan426">Kyosk ist ein öffentliches Wohnzimmer*:</tspan>
</tspan><tspan
           x="0"
           y="346.80572"
           id="tspan430">1. Hier ist kein Raum für Sexismus, Rassismus </tspan><tspan
           x="0"
           y="363.47234"
           id="tspan432">&amp; jegliche Form der Diskriminierung!
</tspan><tspan
           x="0"
           y="380.13897"
           id="tspan436"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
             id="tspan434">-&gt; alle sollen sich wohlfühlen, daher achtet </tspan></tspan><tspan
           x="0"
           y="396.9775"
           id="tspan440"><tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan438">aufeinander!</tspan>
</tspan><tspan
           x="0"
           y="413.81603"
           id="tspan442">2. Kyosk ist und bleibt selbstverwaltet
</tspan><tspan
           x="0"
           y="430.48266"
           id="tspan444">3. Soliprinzip: nicht gewinnorientiert, </tspan><tspan
           x="0"
           y="447.14929"
           id="tspan446">Selbstbedienung &amp; Spendenempfehlung statt </tspan><tspan
           x="0"
           y="463.81591"
           id="tspan450">Konsumzwang, Service &amp; Festpreise - <tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan448">keine </tspan></tspan><tspan
           x="0"
           y="480.65444"
           id="tspan454"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
             id="tspan452">Gastronomie
</tspan></tspan><tspan
           x="0"
           y="497.49297"
           id="tspan456">-&gt;&quot;Lieber gloi zahle, ned später!&quot; Sind auf </tspan><tspan
           x="0"
           y="514.1596"
           id="tspan458">Spenden angewiesen
</tspan><tspan
           x="0"
           y="530.8262"
           id="tspan460">4. Bringt Flaschen zurück &amp; nehmt euren Müll </tspan><tspan
           x="0"
           y="547.49282"
           id="tspan462">mit
</tspan><tspan
           x="0"
           y="564.15945"
           id="tspan464">5. Bitte akzeptiert, wenn die shychtenden </tspan><tspan
           x="0"
           y="580.82607"
           id="tspan466">Personen schließen möchten und haltet euch </tspan><tspan
           x="0"
           y="597.4927"
           id="tspan468">nach 22 Uhr der Nachbar*innen zuliebe nicht </tspan><tspan
           x="0"
           y="614.15933"
           id="tspan470">vor dem Kyosk auf
</tspan><tspan
           x="0"
           y="630.82595"
           id="tspan472">6. Gebt uns gerne Feedback über Mail </tspan><tspan
           x="0"
           y="647.49258"
           id="tspan474">(interym@riseup.net) oder in unseren </tspan><tspan
           x="0"
           y="664.1592"
           id="tspan476">Feedback-Briefkasten</tspan></text></g><g
