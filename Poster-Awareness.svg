         inkscape:label="How-To Awareness Hintergrund" /><text
         xml:space="preserve"
         transform="matrix(0.26458333,0,0,0.25949948,-8.1368446,16.498807)"
         id="text12"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:10.7706px;line-height:1.25;font-family:'Liberation Mono';-inkscape-font-specification:'Liberation Mono';white-space:pre;shape-inside:url(#rect12);display:inline;fill:#000000;fill-opacity:1"
         inkscape:label="How-To Awareness Text"><tspan
           x="0"
           y="327.68695"
           id="tspan873">Wir sehen <tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan871">Awareness</tspan> als kollektive Verantwortung von allen, die sich </tspan><tspan
           x="0"
           y="341.28907"
           id="tspan875">im Kyosk aufhalten. Wenn du Grenzüberschreitungen oder </tspan><tspan
           x="0"
           y="354.75232"
           id="tspan879">diskriminierendes Verhalten beobachtest, <tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan877">schau nicht weg</tspan>: Unterstütze </tspan><tspan
           x="0"
           y="368.35443"
           id="tspan881">Betroffene, sprich Situationen an oder hole die Crew dazu.
</tspan><tspan
           x="0"
           y="381.81769"
           id="tspan883">Wir sind uns bewusst, dass der kyosk kein komplett sicherer Raum sein </tspan><tspan
           x="0"
           y="395.28095"
           id="tspan885">kann und möchten Dinge transparent machen, die wir leisten und auch </tspan><tspan
           x="0"
           y="408.74421"
           id="tspan887">nicht leisten können.
</tspan><tspan
           x="0"
           y="422.20746"
           id="tspan889">
</tspan><tspan
           x="0"
           y="435.67072"
           id="tspan893"><tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan891">WAS WIR LEISTEN KÖNNEN:</tspan>
</tspan><tspan
           x="0"
           y="449.27283"
           id="tspan895">Du kannst dich an die Crew hinter dem Tresen wenden. Wir hören zu und </tspan><tspan
           x="0"
           y="462.73609"
           id="tspan897">schenken Betroffenen glauben, du musst dich dafür nicht erklären.
</tspan><tspan
           x="0"
           y="476.19934"
           id="tspan899">Wir (alle) tragen Verantwortung für den Raum, das heißt: 
</tspan><tspan
           x="0"
           y="489.6626"
           id="tspan901">- Wir sind solidarisch füreinander da. Das kann bedeuten, dass wir </tspan><tspan
           x="0"
           y="503.12586"
           id="tspan903">für betroffene Personen Grenzen kommunizieren können und ggf. </tspan><tspan
           x="0"
           y="516.58911"
           id="tspan905">Menschen dazu auffordern können, den kyosk vorerst für den Abend zu </tspan><tspan
           x="0"
           y="530.05237"
           id="tspan909">verlassen. <tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan907">Über die Ergreifung weiterer Maßnahmen wird plenarisch </tspan></tspan><tspan
           x="0"
           y="543.65448"
           id="tspan913"><tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan911">entschieden.</tspan>
</tspan><tspan
           x="0"
           y="557.2566"
           id="tspan915">- Wir haben einen Rückzugsort, den wir ggf. für dich öffnen können.
</tspan><tspan
           x="0"
           y="570.71985"
           id="tspan917">- Wir können persönliche Gespräche außerhalb des kyosk-Betriebs </tspan><tspan
           x="0"
           y="584.18311"
           id="tspan919">anbieten. Kontaktiere uns hierfür über die Mailadresse </tspan><tspan
           x="0"
           y="597.64637"
           id="tspan921">interym@riseup.net.
</tspan><tspan
           x="0"
           y="611.10962"
           id="tspan923">- Wir machen rauchfreie Shychten, achte dafür auf den Raumstatus auf </tspan><tspan
           x="0"
           y="624.57288"
           id="tspan925">der Website und den Channels.
</tspan><tspan
           x="0"
           y="638.03614"
           id="tspan927">- Ihr könnt uns Feedback über verschiedene Wege kommunizieren. </tspan><tspan
           x="0"
           y="651.49939"
           id="tspan929">Entweder per Mail, im Feedback-Briefkasten oder persönlich.
</tspan></text></g><g
       id="g2633"
