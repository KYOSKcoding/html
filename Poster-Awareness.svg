             id="tspan931">
</tspan></tspan><tspan
           x="263.79297"
           y="99.686509"
           id="tspan937"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan935">WAS WIR NICHT LEISTEN KÖNNEN: 
</tspan></tspan><tspan
           x="263.79297"
           y="113.15742"
           id="tspan941"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan939">- Wir sind kein professionelles </tspan></tspan><tspan
           x="263.79297"
           y="126.62833"
           id="tspan945"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan943">Awareness-Team.
</tspan></tspan><tspan
           x="263.79297"
           y="140.09924"
           id="tspan949"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan947">- Wir können keine durchgehend </tspan></tspan><tspan
           x="263.79297"
           y="153.57014"
           id="tspan953"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan951">nüchterne Ansprechperson </tspan></tspan><tspan
           x="263.79297"
           y="167.04104"
           id="tspan957"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan955">garantieren.
</tspan></tspan><tspan
           x="263.79297"
           y="180.51194"
           id="tspan961"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan959">- Wir können Konflikte nicht </tspan></tspan><tspan
           x="263.79297"
           y="193.98284"
           id="tspan965"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan963">immer aufklären oder </tspan></tspan><tspan
           x="263.79297"
           y="207.45374"
           id="tspan969"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan967">entscheiden, „wer Recht hat“.
</tspan></tspan><tspan
           x="263.79297"
           y="220.92465"
           id="tspan973"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan971">- Wir können keinen </tspan></tspan><tspan
           x="263.79297"
           y="234.39555"
           id="tspan977"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan975">vollständigen Schutz vor </tspan></tspan><tspan
           x="263.79297"
           y="247.86645"
           id="tspan981"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan979">Übergriffen oder Diskriminierung </tspan></tspan><tspan
           x="263.79297"
           y="261.33735"
           id="tspan985"><tspan
             style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold';fill:#ffffff"
             id="tspan983">gewährleisten.
</tspan></tspan></text></g><g
       id="g2633-9"
       transform="matrix(5.7,0,0,5.7,-5.3730362,388.57538)"><rect
         style="opacity:1;fill:#b8ffb8;fill-opacity:1;stroke:none;stroke-width:0.502139;stroke-dasharray:none"
