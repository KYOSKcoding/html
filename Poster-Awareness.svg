         id="text14-2"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:10.6667px;line-height:1.25;font-family:'Liberation Mono';-inkscape-font-specification:'Liberation Mono';white-space:pre;shape-inside:url(#rect14-5);display:inline"
         inkscape:label="QR-Text"><tspan
           x="263.79297"
           y="86.2156"
           id="tspan989"><tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan987">Wichtig</tspan>:
</tspan><tspan
           x="263.79297"
           y="99.686509"
           id="tspan991">Im Kyosk wird teilweise </tspan><tspan
           x="263.79297"
           y="113.01988"
           id="tspan993">geraucht, Alkohol </tspan><tspan
           x="263.79297"
           y="126.35326"
           id="tspan995">konsumiert und es kann </tspan><tspan
           x="263.79297"
           y="139.68664"
           id="tspan997">laut, voll und wuselig </tspan><tspan
           x="263.79297"
           y="153.02001"
           id="tspan999">werden. Außerdem stinkt’s </tspan><tspan
           x="263.79297"
           y="166.35339"
           id="tspan1003">ziemlich. <tspan
   style="font-weight:bold;-inkscape-font-specification:'Liberation Mono Bold'"
   id="tspan1001">Sorry</tspan>!
</tspan><tspan
           x="263.79297"
           y="179.82429"
           id="tspan1005">Awareness funktioniert </tspan><tspan
           x="263.79297"
           y="193.15766"
           id="tspan1007">nur gemeinsam. Achtet </tspan><tspan
           x="263.79297"
           y="206.49104"
           id="tspan1009">aufeinander, respektiert </tspan><tspan
           x="263.79297"
           y="219.82441"
           id="tspan1011">Grenzen und unterstützt </tspan><tspan
           x="263.79297"
           y="233.15778"
           id="tspan1013">Menschen, die </tspan><tspan
           x="263.79297"
           y="246.49116"
           id="tspan1015">Unterstützung brauchen.</tspan></text></g><g
