<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio - kyo.sk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="radio-container">
        <div class="radio-header">
            <h1>Ky - Broadcast</h1>
            <p class="radio-track">Al Bint El Shalabiya</p>
        </div>

        <!-- Authentication Section -->
        <div id="authSection" class="auth-section" style="display: none;">
            <div class="auth-input-group">
                <input type="password" id="passwordInput" class="auth-input" placeholder="Enter broadcast password" />
                <button id="authButton" class="auth-button">Unlock Broadcast</button>
            </div>
            <span id="authStatus" class="auth-status"></span>
        </div>

        <div class="radio-control">
            <button id="toggleButton" class="toggle-switch off" aria-label="Toggle radio" style="display: none;">
                <span class="switch-inner">OFF</span>
            </button>
            <div id="waitingMessage" class="waiting-message" style="display: none;">
                <p>🎙️ Waiting for broadcast...</p>
                <p class="waiting-subtext">Current time: <span id="waitingTime">00:00</span></p>
            </div>
            <div class="status-indicator">
                <span id="statusText" class="status-text">Offline</span>
                <span id="timeDisplay" class="time-display">00:00</span>
            </div>
        </div>

        <div class="radio-info">
            <div class="info-item">
                <span class="label">Duration:</span>
                <span id="durationDisplay">3:08</span>
            </div>
            <div class="info-item">
                <span class="label">Listeners:</span>
                <span id="listenerCount">∞</span>
            </div>
        </div>

        <div class="error-container" id="errorContainer" style="display: none;">
            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- Hidden audio element for playback reference -->
        <audio id="radioAudio" preload="metadata"></audio>
    </div>

    <script src="radio.js"></script>
</body>

</html>
