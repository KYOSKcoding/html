<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio - kyo.sk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="radio-container">
        <div class="radio-header">
            <h1>Ky - Broadcast</h1>
            <p class="radio-track">Jingle Macker</p>
        </div>

        <div class="radio-control">
            <!-- Status indicator (all users) -->
            <button id="toggleButton" class="toggle-switch off" aria-label="Broadcast status">
                <span class="switch-inner">OFF</span>
            </button>

            <!-- Listen button (all users, local audio control) -->
            <button id="listenButton" class="listen-button" disabled>Loading&hellip;</button>

            <!-- Play/Stop button (broadcaster only, controls server broadcast) -->
            <button id="playButton" class="play-button" style="display: none;">&#9654; Broadcast</button>

            <!-- Logout button (broadcaster only) -->
            <button id="logoutButton" class="logout-button" style="display: none;">Logout</button>

            <div class="status-indicator">
                <span id="statusText" class="status-text">Offline</span>
                <span id="timeDisplay" class="time-display">00:00</span>
            </div>
        </div>

        <div class="radio-info">
            <div class="info-item">
                <span class="label">Duration:</span>
                <span id="durationDisplay">0:27</span>
            </div>
            <div class="info-item">
                <span class="label">Listeners:</span>
                <span id="listenerCount">&#8734;</span>
            </div>
        </div>

        <div class="error-container" id="errorContainer" style="display: none;">
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="broadcaster-footer">
            <a id="loginLink" class="login-link" href="#">Broadcaster</a>
        </div>

        <audio id="radioAudio" preload="auto" loop></audio>
    </div>

    <!-- Auth modal -->
    <div id="authModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="modalClose" class="modal-close">&#215;</button>
            <h3>Broadcaster Login</h3>
            <div class="auth-input-group">
                <input type="password" id="passwordInput" class="auth-input" placeholder="Password" />
                <button id="authButton" class="auth-button">Login</button>
            </div>
            <span id="authStatus" class="auth-status"></span>
        </div>
    </div>

    <script src="radio.js?v=2"></script>
</body>

</html>
