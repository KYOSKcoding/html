<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio - kyo.sk</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>

<body>
    <div class="radio-container">
        <div class="radio-header">
            <h1>Ky - Broadcast</h1>
            <p class="radio-track">Jingle Macker</p>
        </div>

        <div class="radio-control">
            <!-- Status indicator (all users) -->
            <button id="toggleButton" class="toggle-switch off" aria-label="Broadcast status">
                <span class="switch-inner">OFF</span>
            </button>

            <!-- Listen button (all users, local audio control) -->
            <button id="listenButton" class="listen-button" disabled>Loading&hellip;</button>

            <!-- Play/Stop button (broadcaster only, controls server broadcast) -->
            <button id="playButton" class="play-button" style="display: none;">&#9654; Broadcast</button>

            <!-- Go Live button (broadcaster only, switches all listeners to mic stream) -->
            <button id="liveButton" class="live-button" style="display: none;">&#9679; Go Live</button>

            <!-- Monitor button (broadcaster only, private preview of live HLS) -->
            <button id="monitorButton" class="monitor-button" style="display: none;">&#128266; Monitor</button>

            <!-- Logout button (broadcaster only) -->
            <button id="logoutButton" class="logout-button" style="display: none;">Logout</button>

            <div class="status-indicator">
                <span id="statusText" class="status-text">Offline</span>
                <span id="timeDisplay" class="time-display">00:00</span>
                <span id="listenerCount" class="listener-count" style="display: none;">👥 0</span>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-container">
            <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" />
            <div class="time-info">
                <span id="currentTime" class="time">0:00</span>
                <span class="time-separator">/</span>
                <span id="duration" class="time">0:00</span>
            </div>
        </div>

        <div class="error-container" id="errorContainer" style="display: none;">
            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- Song selector (broadcaster only) -->
        <div id="songSection" class="song-section" style="display: none;">
            <div class="song-header">
                <div class="song-label">Playlist</div>
                <div class="playlist-controls">
                    <button id="prevButton" class="nav-btn" title="Previous">⏮</button>
                    <button id="playPauseButton" class="play-pause-btn" title="Play/Pause">&#9654;</button>
                    <button id="nextButton" class="nav-btn" title="Next">⏭</button>
                    <button id="shuffleButton" class="shuffle-btn" title="Shuffle">⇄</button>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100"
                        title="Volume">
                </div>
            </div>
            <ul id="fileList" class="file-list"></ul>
            <button id="importButton" class="import-button">+ Import Files</button>
        </div>

        <div class="broadcaster-footer">
            <a id="loginLink" class="login-link" href="#">Broadcaster</a>
        </div>

        <audio id="radioAudio" preload="none"></audio>
    </div>

    <!-- Auth modal -->
    <div id="authModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="modalClose" class="modal-close">&#215;</button>
            <h3>Broadcaster Login</h3>
            <div class="auth-input-group">
                <input type="password" id="passwordInput" class="auth-input" placeholder="Password" />
                <button id="authButton" class="auth-button">Login</button>
            </div>
            <span id="authStatus" class="auth-status"></span>
        </div>
    </div>

    <audio id="monitorAudio" style="display:none;"></audio>

    <!-- Archive player box -->
    <div class="radio-container archive-container">
        <div class="radio-header">
            <h1>KY - Archive</h1>
            <p class="radio-track" id="archiveNowPlaying">— select a track —</p>
        </div>

        <div class="song-header" style="margin-bottom:10px;">
            <span class="song-label">Now Playing</span>
            <div class="playlist-controls">
                <button class="nav-btn" id="archivePrevBtn" title="Previous" disabled>⏮</button>
                <button class="play-pause-btn" id="archivePlayPauseBtn" disabled>▶</button>
                <button class="nav-btn" id="archiveNextBtn" title="Next" disabled>⏭</button>
                <input type="range" class="volume-slider" id="archiveVolume" min="0" max="100" value="80" title="Volume">
            </div>
        </div>

        <div class="progress-container">
            <input type="range" id="archiveProgressBar" class="progress-bar" min="0" max="100" value="0" disabled />
            <div class="time-info">
                <span id="archiveCurrentTime" class="time">0:00</span>
                <span class="time-separator">/</span>
                <span id="archiveDuration" class="time">0:00</span>
            </div>
        </div>

        <div class="song-section" style="margin-top:0;">
            <div class="song-header" style="margin-bottom:8px;">
                <span class="song-label">Recordings</span>
                <button class="play-pause-btn" id="archiveRefreshBtn" title="Refresh">↻</button>
            </div>
            <ul class="file-list" id="archiveFileList">
                <li class="archive-empty">Loading…</li>
            </ul>
        </div>
    </div>

    <script src="radio.js?v=18"></script>
</body>

</html>
